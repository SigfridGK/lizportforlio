<div class="lizContainer1" ng-controller="PdyAppCtrl" >
    <p class="lizh2">Payday Today</p>
    <div class="container">
        <div class="row">
            <div class="col-sm-7 lizRowColStyle">

                <p class="lizP">Services</p>
                <button class="lizMenuBtn" ng-click="click('https://streamable.com/e/gup0a8')">
                    Watch GK Login
                </button>

                <ul>
                    <li ng-repeat="menu in menuList">
                        <button class="lizMenuBtn1" ng-click="click(menu.VidURL)">
                            {{menu.AppName}}
                        </button>
                    </li> 
                </ul>

                <p class="lizP2">Others--</p>
                <ul style="margin-top: -20px">
                    <li ng-repeat="menu in otherVid">
                        <button class="lizMenuBtn1" ng-click="click(menu.VidURL)">
                            {{menu.AppName}}
                        </button>
                    </li> 
                </ul>
            </div>


            <div class="col-sm-5" style="background-color: black">
                <iframe ng-src="{{activeVidURL}}" frameborder="0" width="100%" height="100%" allowfullscreen class="lizVid" id="lizIframeVid">
                </iframe>
            </div>
        </div>
    </div>
</div>
